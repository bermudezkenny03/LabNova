services:
  - type: web
    name: labnova-backend
    runtime: docker
    plan: free
    rootDir: backend-lab-nova
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: LabNova
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: labnova-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: ""

databases:
  - name: labnova-db
    plan: free
    databaseName: labnova
    user: labnova_user
